name: Package extension

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build package
        run: npm run package

      - name: Upload extension ZIP
        uses: actions/upload-artifact@v7
        with:
          name: chatgpt-conversation-search-${{ github.sha }}
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30
